<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Schedules - إدارة الرحلات</title>

  <!-- ربط ملف CSS الجديد -->
  <link rel="stylesheet" href="ArwaAlrotiq.css">
</head>

<body>
  <div class="container">
    <h1>إدارة جدول الرحلات (Train Schedules)</h1>
    
    <div class="form-container">
      <form id="schedule-form">
        <input type="hidden" id="trip-id">
        
        <div class="form-group">
          <label for="trip-name">اسم الرحلة:</label>
          <input type="text" id="trip-name" placeholder="مثال: قطار الرياض - الدمام" required>
        </div>
        
        <div class="form-group">
          <label for="departure-time">وقت الإقلاع:</label>
          <input type="time" id="departure-time" required>
        </div>
        
        <div class="form-group">
          <label for="destination">الوجهة:</label>
          <input type="text" id="destination" placeholder="مثال: الدمام" required>
        </div>
        
        <div class="buttons">
          <button type="submit" id="btn-create" class="btn-create">Create</button>
          <button type="button" id="btn-update" class="btn-update" style="display: none;">Update</button>
        </div>
      </form>
    </div>

    <table id="schedule-table">
      <thead>
        <tr>
          <th>اسم الرحلة</th>
          <th>وقت الإقلاع</th>
          <th>الوجهة</th>
          <th>الإجراءات (Actions)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Rows will be added here by JS -->
      </tbody>
    </table>
  </div>

  <!-- ربط ملف JS الجديد -->
  <script src="ArwaAlrotiq.js" type="module"></script>

</body>
</html>
