<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Train Schedules - Admin</title>
    <link rel="stylesheet" href="history.css">
</head>

<body>

    <h1>Historical Train Schedules</h1>

    <div class="container">

        <!-- Search Section -->
        <div class="search-bar">
            <input type="text" id="searchTrain" placeholder="Search by Train Name..."
                onkeyup="searchHistoricalSchedules()">
        </div>
        <button onclick="clearHistory()" class="clear-btn">Clear History</button>

        <!-- Table -->
        <table id="historyTable" border="1">
            <thead>
                <tr>
                    <th>Train Name</th>
                    <th>Route</th>
                    <th>Departure Time</th>
                    <th>Arrival Time</th>
                    <th>Price (SAR)</th>
                    <th>Seat Capacity</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historicalTableBody"></tbody>
        </table>

        <p id="noDataMessage" class="no-data"></p>

    </div>

<script type="module" src="history.js"></script>
</body>

</html>
