<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Schedules Management and schedule list</title>
  <link rel="stylesheet" href="form.css">
</head>

<body>
  <div class="container">
    <h1>Train Schedules Management</h1>
    
    <div class="form-container">
      <form id="schedule-form" onsubmit="return validate()">
        <input type="hidden" id="train-id">
        
        <div class="form-group">
          <label for="train-name">Train Name:</label>
          <input type="text" id="train-name" placeholder="Example: Riyadh - Dammam Train" required>
        </div>
        
        <div class="form-group">
          <label for="departure-time">Departure Time:</label>
          <input type="time" id="departure-time" required>
        </div>

        <div class="form-group">
          <label for="arrival-time">Arrival Time:</label>
          <input type="time" id="arrival-time" required>
        </div>
        
        <div class="form-group">
          <label for="destination">Destination:</label>
          <input type="text" id="destination" placeholder="Example: Dammam" required>
        </div>

        <div class="form-group">
          <label for="seat-capacity">Seat Capacity:</label>
          <input type="number" id="seat-capacity" placeholder="Example: 120" required>
        </div>
        
        <div class="form-group">
          <label for="ticket-price">Ticket Price:</label>
          <input type="number" id="ticket-price" placeholder="Example: 150" required>
        </div>

        <div class="buttons">
          <button type="submit" id="btn-create" class="btn-create">Create</button>
          <button type="button" id="btn-update" class="btn-update" style="display: none;">Update</button>
        </div>
      </form>
    </div>

    <h2>Train schedule list</h2>

    <table id="schedule-table">
      <thead>
        <tr>
          <th>Train Name</th>
          <th>Departure Time</th>
          <th>Arrival Time</th>
          <th>Destination</th>
          <th>Ticket Price</th>
          <th>Seat Capacity</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="schedule-body"></tbody>
    </table>
  </div>

  <script src="form.js" type="module"></script>
  <script src="validation.js"></script>
</body>
</html>
