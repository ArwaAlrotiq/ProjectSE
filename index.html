<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع البرمجة الجماعي</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1000px;
            width: 90%;
            margin: 40px auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .student-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: var(--primary-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eee;
        }
        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }
        .student-card h3 {
            margin: 0 0 10px 0;
            color: var(--accent-color);
        }
        footer {
            margin-top: auto;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>لوحة تحكم المشروع الجماعي</h1>
    <p>يرجى الاختيار لاستعراض الجزء  </p>
</header>

<div class="container">
    <div class="grid">
        
        <a href="ArwaAlrotiq/ArwaAlrotiq.html" class="student-card">
            <h3>Train Schedules</h3>
        </a>

        <a href="Name2_Folder/Name2.html" class="student-card">
            <h3>اسم الجزء الثاني</h3>
        </a>

        <a href="Name3_Folder/Name3.html" class="student-card">
            <h3>اسم الجزء الثالث</h3>
        </a>

        <a href="Name4_Folder/Name4.html" class="student-card">
            <h3>اسم الجزء الرابع</h3>
        </a>

        <a href="Name5_Folder/Name5.html" class="student-card">
            <h3>اسم الجزء الخامسة</h3>
        </a>

        <a href="Name6_Folder/Name6.html" class="student-card">
            <h3>اسم الجزء السادسة</h3>
        </a>

    </div>
</div>

<footer>
    تم تطوير هذا المشروع بواسطة فريق العمل - 2026
</footer>

</body>
</html>
