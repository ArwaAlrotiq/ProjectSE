<head>
    <meta charset="UTF-8">
    <title>Login - Train System</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Role Gateway (S21) -->
    <div class="container" id="role-gateway">
        <h1>What's your role?</h1>
        <div class="roles">
            <div class="role-card" onclick="selectRole(this, 'admin')">
                <h3>Railway Administrator</h3>
            </div>
            <div class="role-card" onclick="selectRole(this, 'manager')">
                <h3>Manager</h3>
            </div>
            <div class="role-card" onclick="selectRole(this, 'staff')">
                <h3>Reservation Agent</h3>
            </div>
        </div>
        <button class="next-btn" onclick="goNext()">Next</button>
    </div>


    <!--  Login Form (S22) -->
    <div class="login-container" id="login-form" style="display:none;">
        <h2>Train Management System</h2>
        <div id="error-msg" class="error hidden"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
       
<div class="form-group">
    <label>Signup Username</label>
    <input type="text" id="signupUsername" placeholder="Enter username">
</div>
<div class="form-group">
    <label>Signup Password</label>
    <input type="password" id="signupPassword" placeholder="Enter password">
</div>
<button onclick="handleSignup()">Sign Up</button>
        <button onclick="handleLogin()">Login</button>
    </div>

    <script src="encryption.js"></script>
    <script src="auth.js"></script>
    <script src="login.js"></script>

   
 
    <script src="role-gateway.js"></script>
</body>
</html>
