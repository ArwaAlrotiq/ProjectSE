<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Role based & Train System Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container" id="role-gateway">
        <h1>Select Your Role</h1>

        <div class="roles">
            <div class="role-card" onclick="selectRole(this, 'administrator')">
                <h3>Railway Administrator</h3>
            </div>

            <div class="role-card" onclick="selectRole(this, 'manager')">
                <h3>Manager</h3>
            </div>

            <div class="role-card" onclick="selectRole(this, 'reservation_agent')">
                <h3>Reservation Agent</h3>
            </div>
        </div>

        <button class="next-btn" onclick="nextButton()">Next</button>
        
    </div>

    <div class="login-container" id="login-form" style="display:none;">
        <h2>Train Management System</h2>

        <p id="role-display"></p>

        <div id="error-msg" class="error hidden"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <button onclick="handleLogin()">Login</button>
        <button onclick="backButtn()">Back</button>
    </div>

    <script src="role-gateway.js"></script>
    <script src="encryption.js"></script>
    <script src="auth.js"></script>
    <script src="login.js"></script>

</body>
</html>
