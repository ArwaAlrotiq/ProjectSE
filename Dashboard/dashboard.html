<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" href="favicon.ico">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Scroll Hint */
        .scroll-hint {
            text-align: center;
            font-size: 18px;
            color: #777;
            margin-top: 5px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(6px);
            }
        }

        @media (max-width: 600px) {

            body {
                padding: 10px;
                display: block;
                align-items: flex-start;
            }

            button,
            input,
            select {
                width: 100%;
                margin-bottom: 10px;
            }

            .scroll-hint {
                font-size: 16px;
            }
        }
    </style>
</head>

<body onload="initDashboard()">

    <h2 style="margin-top: 30px;">System Summary Dashboard</h2>

    <!-- Scroll Hint -->
    <div class="scroll-hint">▼ Scroll down for more ▼</div>

    <div class="summary-container">
        <div class="card">
            <h3>Total Trains</h3>
            <p id="totalTrains">0</p>
        </div>
        <div class="card">
            <h3>Total Bookings</h3>
            <p id="totalBookings">0</p>
        </div>
        <div class="card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">0 SAR</p>
        </div>
    </div>

    <hr style="width: 80%; margin: 40px auto; border: 0.5px solid #ccc;">

    <h2>Train Utilization</h2>

    <div id="chartsContainer" class="charts-grid-container"></div>


    <!-- ================================
         OCCUPANCY OVERVIEW
    ================================= -->
    <h2 style="margin-top: 40px;">Occupancy Overview</h2>
    <div id="utilization-table"></div>

    <!-- Occupancy Table -->
    <div id="occupancy-container"></div>

    <!-- Occupancy Chart -->
    <div style="width: 80%; margin: 40px auto;">
        <canvas id="occupancyChart"></canvas>
    </div>
<script type="module" src="dashboard.js"></script>
<script type="module" src="trends.js"></script>
</body>

</html>
