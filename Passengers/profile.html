<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <h2>Manage Passenger Profile</h2>
        <p>Update or delete your registration details below.</p>
        
        <form id="profile-form">
            <input type="hidden" id="p-id">
            
            <div class="grid-container">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="p-first-name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="p-last-name">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="p-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="p-dob">
                </div>
                <div class="form-group">
                    <label>Nationality</label>
                    <input type="text" id="p-nationality">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="p-email">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="p-phone">
                </div>
                <div class="form-group">
                    <label>Passport / ID</label>
                    <input type="text" id="p-passport">
                </div>
                <div class="form-group full-width">
                    <label>Emergency Contact</label>
                    <input type="text" id="p-emergency">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="btn-update" class="btn-update">Update Information</button>
                <button type="button" id="btn-delete" class="btn-delete">Delete My Profile</button>
            </div>
        </form>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
