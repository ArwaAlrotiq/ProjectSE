<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Statistics Dashboard</title>
    <!-- External CSS for consistent styling -->
    <link rel="stylesheet" href="daily.css">
    <!-- Chart.js library for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .report-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .header-section h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 28px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 5px solid #2ecc71;
        }
        .stat-card h3 {
            margin: 0;
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .stat-card p {
            margin: 10px 0 0;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body onload="generateWeeklyReport()">

    <div class="report-container">
        <div class="header-section">
            <h1>Weekly Revenue & Booking Analytics</h1>
        </div>

        <div class="summary-grid">
            <div class="stat-card">
                <h3>Total Weekly Revenue</h3>
                <p id="totalRevenue">0 SAR</p>
            </div>
            <div class="stat-card" style="border-left-color: #3498db;">
                <h3>Confirmed Bookings</h3>
                <p id="totalBookings">0</p>
            </div>
            <div class="stat-card" style="border-left-color: #f1c40f;">
                <h3>System Status</h3>
                <p>Active</p>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="weeklyReportChart"></canvas>
        </div>
    </div>

    <!-- Link to your JavaScript logic file -->
    <script src="weekly.js"></script>
</body>
</html>
